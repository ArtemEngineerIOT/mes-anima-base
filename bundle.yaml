openapi: 3.0.3
info:
    title: System Monitoring API
    description: API для экранов системы мониторинга инженерных систем
    version: 1.0.0
paths:
    /auth/login:
        post:
            summary: Аутентификация пользователя
            description: Вход в систему с использованием username и password
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/User"
            responses:
                "200":
                    description: Успешная аутентификация
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/LoginResponse"
                "400":
                    $ref: "#/components/responses/Error"
                "401":
                    $ref: "#/components/responses/UnauthorizedError"
    /auth/refresh:
        post:
            summary: refresh токена
            description: Получение refreshToken
            parameters:
                - in: cookie
                  name: refreshToken
                  schema:
                      type: string
            responses:
                "200":
                    description: Успешная аутентификация
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/LoginResponse"
                "401":
                    $ref: "#/components/responses/UnauthorizedError"
    /summary:
        post:
            summary: Получение данных сводного экрана оператора
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties: {}
            responses:
                "200":
                    description: Успешное получение данных сводного экрана
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Summary"
                "400":
                    $ref: "#/components/responses/Error"
                "401":
                    $ref: "#/components/responses/UnauthorizedError"
components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    schemas:
        User:
            type: object
            required:
                - username
                - password
            properties:
                username:
                    type: string
                password:
                    type: string
        LoginResponse:
            type: object
            properties:
                code:
                    type: string
                message:
                    type: string
                token:
                    type: string
        Error:
            type: object
            properties:
                error:
                    type: string
                message:
                    type: string
                path:
                    type: string
                status:
                    type: integer
                timestamp:
                    type: string
        UnauthorizedError:
            type: object
            required:
                - code
                - type
                - token
            properties:
                code:
                    type: string
                message:
                    type: string
                token:
                    type: string
        System:
            type: object
            properties:
                id:
                    type: string
                systemName:
                    type: string
                availability:
                    type: string
                activeRequests:
                    type: integer
                averageResponseTime:
                    type: string
                onTimeCompletion:
                    type: string
                icon:
                    type: string
                status:
                    type: string
                activeAlerts:
                    type: integer
                equipmentCount:
                    type: integer
                onlineEquipment:
                    type: integer
                lastUpdate:
                    type: string
                    format: date-time
        KPI:
            type: object
            properties:
                totalActive:
                    type: integer
                averageResponseTime:
                    type: string
                onTimeCompletion:
                    type: string
                criticalIncidents:
                    type: integer
        Equipment:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                systemId:
                    type: string
                systemLabel:
                    type: string
                status:
                    type: string
                statusLabel:
                    type: string
                location:
                    type: string
                lastMaintenanceDate:
                    type: string
                    format: date-time
        Summary:
            type: object
            properties:
                systems:
                    type: array
                    items:
                        $ref: "#/components/schemas/System"
                kpi:
                    $ref: "#/components/schemas/KPI"
                equipment:
                    type: array
                    items:
                        $ref: "#/components/schemas/Equipment"
    responses:
        Error:
            description: Неверный запрос (Ошибка запроса)
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
        UnauthorizedError:
            description: Неавторизованный доступ
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/UnauthorizedError"
