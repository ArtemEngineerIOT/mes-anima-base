components:
    schemas:
        # Схемы для summary
        Summary:
            type: object
            properties:
                systems:
                    type: array
                    items:
                        $ref: "#/components/schemas/System"
                kpi:
                    $ref: "#/components/schemas/KPI"
                equipment:
                    type: array
                    items:
                        $ref: "#/components/schemas/Equipment"

        System:
            type: object
            properties:
                id:
                    type: string
                systemName:
                    type: string
                availability:
                    type: string
                activeRequests:
                    type: integer
                averageResponseTime:
                    type: string
                onTimeCompletion:
                    type: string
                icon:
                    type: string
                status:
                    type: string
                activeAlerts:
                    type: integer
                equipmentCount:
                    type: integer
                onlineEquipment:
                    type: integer
                lastUpdate:
                    type: string
                    format: date-time

        KPI:
            type: object
            properties:
                totalActive:
                    type: integer
                averageResponseTime:
                    type: string
                onTimeCompletion:
                    type: string
                criticalIncidents:
                    type: integer

        Equipment:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                systemId:
                    type: string
                systemLabel:
                    type: string
                status:
                    type: string
                statusLabel:
                    type: string
                location:
                    type: string
                lastMaintenanceDate:
                    type: string
                    format: date-time

        # Схемы для аутентификации
        User:
            type: object
            required:
                - username
                - password
            properties:
                username:
                    type: string
                password:
                    type: string

        LoginResponse:
            type: object
            properties:
                code:
                    type: string
                message:
                    type: string
                token:
                    type: string

        MesUserProfileRequestItem:
            type: object
            required:
                - login
            properties:
                login:
                    type: string
                    description: Логин пользователя из JWT (`sub`)
            additionalProperties: true

        MesUserProfileRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/MesUserProfileRequestItem"

        MesUserProfileRow:
            type: object
            required:
                - outcome
            properties:
                outcome:
                    type: string
                    description: "SUCCESS или FAILED"
                code:
                    type: string
                    nullable: true
                    description: "MES_ACCOUNT_NOT_FOUND, MES_ACCOUNT_INACTIVE, MES_EMPLOYEE_INACTIVE"
                message:
                    type: string
                    nullable: true
                user_account_id:
                    type: string
                    nullable: true
                employee_id:
                    type: string
                    nullable: true
                fio:
                    type: string
                    nullable: true
                position:
                    type: string
                    nullable: true
                    description: Должность для UI — roles.name (человекочитаемо)
                position_code:
                    type: string
                    nullable: true
                    description: Код должности — roles.code (например OPERATOR)
                app_role_codes:
                    type: string
                    nullable: true
                    description: Коды app_roles.code через запятую (SYSTEM, OPERATOR, …) — меню и права UI
                allowed_resource_codes:
                    type: string
                    nullable: true
                    description: Коды resources.resource_code через запятую (допуски оператора)
                rights_load_outcome:
                    type: string
                    nullable: true
                    description: SUCCESS / FAILED — итог загрузки прав (при успешном профиле)
                rights_load_code:
                    type: string
                    nullable: true
                    description: MES_RIGHTS_LOAD_ERROR при сбое прав
                rights_load_message:
                    type: string
                    nullable: true
                    description: Сообщение при сбое загрузки прав
            additionalProperties: true

        MesUserProfileResponse:
            type: array
            items:
                $ref: "#/components/schemas/MesUserProfileRow"

        OrderExecutionRequestItem:
            type: object
            properties:
                resourceCode:
                    type: string
                    description: Код ресурса (машины) из getProductionPlanMachines
            required:
                - resourceCode
            additionalProperties: true

        OrderExecutionRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionRequestItem"

        OrderExecutionSidebarBadge:
            type: object
            properties:
                unprocessed_events_count:
                    type: number
                    nullable: true
            additionalProperties: true

        OrderExecutionHeaderRow:
            type: object
            properties:
                product:
                    type: string
                    nullable: true
                project:
                    type: string
                    nullable: true
                client:
                    type: string
                    nullable: true
                order:
                    type: string
                    nullable: true
            additionalProperties: true

        OrderExecutionResultItem:
            type: object
            description: Элемент `result` в ответе getOrderExecution
            properties:
                work_area_id:
                    type: string
                    nullable: true
                    description: Пусто/null — на машине нет назначенного этапа
                resource_id:
                    type: string
                    nullable: true
                sidebar_badges:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionSidebarBadge"
                header:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionHeaderRow"
            additionalProperties: true

        OrderExecutionResultRow:
            type: object
            description: Обёртка ответа RPC getOrderExecution
            properties:
                error_code:
                    type: string
                    description: Код результата; `OK` — успех, иначе ошибка
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionResultItem"
            additionalProperties: true

        OrderExecutionResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionResultRow"

        OrderExecutionResolveBarcodeOnStageRequestItem:
            type: object
            description: Запрос resolveBarcodeOnStage (SCR-04 M2) — кнопка «В машину»
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
                barcode:
                    type: string
                    description: Штрихкод серии материала (lot; пробелы значимы)
                installationPlace:
                    type: string
                    enum:
                        - WAITING
                        - ON_UNWIND
                    description: Место установки рулона (`installation_place`)
                operatorRef:
                    type: string
                    description: Ссылка на оператора в MES (`operator_ref`)
            required:
                - workAreaId
                - barcode
                - installationPlace
                - operatorRef
            additionalProperties: true

        OrderExecutionResolveBarcodeOnStageRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionResolveBarcodeOnStageRequestItem"

        OrderExecutionResolveBarcodeOnStageResultItem:
            type: object
            description: Элемент `result` в ответе resolveBarcodeOnStage
            properties:
                stage_spec_status:
                    type: string
                    nullable: true
                stage_spec_banner_visible:
                    type: boolean
                    nullable: true
                stage_spec_banner_title:
                    type: string
                    nullable: true
                stage_spec_banner_detail:
                    type: string
                    nullable: true
                already_registered_on_stage:
                    type: boolean
                    nullable: true
                scan_blocked_by_active_input:
                    type: boolean
                    nullable: true
                material_roll_id:
                    type: string
                    nullable: true
                roll_trace_context_id:
                    type: string
                    nullable: true
                presence_status:
                    type: string
                    nullable: true
                    description: Статус после скана (`WAITING` / `ON_UNWIND`)
                presence_refresh_hint:
                    type: boolean
                    nullable: true
                stage_registry_refresh_hint:
                    type: boolean
                    nullable: true
                write_off_form_enabled:
                    type: boolean
                    nullable: true
                series_card:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialSeriesCard"
            additionalProperties: true

        OrderExecutionResolveBarcodeOnStageResultRow:
            type: object
            description: Обёртка ответа RPC resolveBarcodeOnStage
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionResolveBarcodeOnStageResultItem"
            additionalProperties: true

        OrderExecutionResolveBarcodeOnStageResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionResolveBarcodeOnStageResultRow"

        OrderExecutionSubmitMoveToUnwindRequestItem:
            type: object
            description: Запрос submitMoveToUnwind (SCR-04 M3) — кнопка «На размотку»
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
                materialRollId:
                    type: string
                    description: Идентификатор рулона (`material_roll_id` из строки presence)
                barcode:
                    type: string
                    description: Штрихкод серии рулона
                operatorRef:
                    type: string
                    description: Ссылка на оператора в MES (`operator_ref`)
            required:
                - workAreaId
                - materialRollId
                - barcode
                - operatorRef
            additionalProperties: true

        OrderExecutionSubmitMoveToUnwindRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionSubmitMoveToUnwindRequestItem"

        OrderExecutionSubmitMoveToUnwindResultItem:
            type: object
            description: Элемент `result` в ответе submitMoveToUnwind
            properties:
                material_roll_id:
                    type: string
                    nullable: true
                presence_status:
                    type: string
                    nullable: true
                    description: Статус после перемещения (`ON_UNWIND`)
                presence_refresh_hint:
                    type: boolean
                    nullable: true
                stage_registry_refresh_hint:
                    type: boolean
                    nullable: true
            additionalProperties: true

        OrderExecutionSubmitMoveToUnwindResultRow:
            type: object
            description: Обёртка ответа RPC submitMoveToUnwind
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionSubmitMoveToUnwindResultItem"
            additionalProperties: true

        OrderExecutionSubmitMoveToUnwindResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionSubmitMoveToUnwindResultRow"

        OrderExecutionMaterialSeriesCard:
            type: object
            properties:
                nomenclature_name:
                    type: string
                    nullable: true
                nomenclature_code:
                    type: string
                    nullable: true
                series_ref:
                    type: string
                    nullable: true
                external_series_key:
                    type: string
                    nullable: true
                quantity_uom:
                    type: string
                    nullable: true
                current_length_m:
                    type: number
                    nullable: true
                current_weight_kg:
                    type: number
                    nullable: true
                is_semi_finished:
                    type: boolean
                    nullable: true
            additionalProperties: true

        OrderExecutionStageRollRegistryRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        OrderExecutionStageRollRegistryRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionStageRollRegistryRequestItem"

        OrderExecutionStageRollRegistryOperationLine:
            type: object
            properties:
                operation_kind:
                    type: string
                    nullable: true
                operation_kind_label:
                    type: string
                    nullable: true
                quantity_primary:
                    type: number
                    nullable: true
                uom_primary:
                    type: string
                    nullable: true
                quantity_secondary:
                    type: number
                    nullable: true
                uom_secondary:
                    type: string
                    nullable: true
            additionalProperties: true

        OrderExecutionStageRollRegistryRollRow:
            type: object
            description: Запись рулона в `rows` ответа getStageRollRegistry
            properties:
                material_roll_id:
                    type: string
                    nullable: true
                barcode:
                    type: string
                    nullable: true
                nomenclature_name:
                    type: string
                    nullable: true
                quantity_primary:
                    type: number
                    nullable: true
                uom_primary:
                    type: string
                    nullable: true
                quantity_secondary:
                    type: number
                    nullable: true
                uom_secondary:
                    type: string
                    nullable: true
                roll_status:
                    type: string
                    nullable: true
                roll_status_label:
                    type: string
                    nullable: true
                stage_input_card_status:
                    type: string
                    nullable: true
                operation_lines:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollRegistryOperationLine"
            additionalProperties: true

        OrderExecutionStageRollRegistrySnapshot:
            type: object
            description: Снимок журнала в `result` ответа getStageRollRegistry
            properties:
                work_area_id:
                    type: string
                    nullable: true
                as_of:
                    type: string
                    nullable: true
                    description: Время актуальности данных
                rows:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollRegistryRollRow"
            additionalProperties: true

        OrderExecutionStageRollRegistryResultRow:
            type: object
            description: Обёртка ответа RPC getStageRollRegistry
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollRegistrySnapshot"
            additionalProperties: true

        OrderExecutionStageRollRegistryResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionStageRollRegistryResultRow"

        OrderExecutionStageRollPresenceRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        OrderExecutionStageRollPresenceRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionStageRollPresenceRequestItem"

        OrderExecutionStageRollPresencePresenceRow:
            type: object
            description: Рулон в `waiting_rows` / `unwind_row` ответа getStageRollPresence
            properties:
                presence_id:
                    type: string
                    nullable: true
                material_roll_id:
                    type: string
                    nullable: true
                barcode:
                    type: string
                    nullable: true
                presence_status:
                    type: string
                    nullable: true
                    description: Статус (`WAITING` / `ON_UNWIND`)
                presence_status_label:
                    type: string
                    nullable: true
                current_length_m:
                    type: number
                    nullable: true
                current_weight_kg:
                    type: number
                    nullable: true
                can_move_to_unwind:
                    type: boolean
                    nullable: true
                write_off_allowed:
                    type: boolean
                    nullable: true
            additionalProperties: true

        OrderExecutionStageRollPresenceSlotGroup:
            type: object
            description: Группа рулонов одной номенклатуры в `slot_groups`
            properties:
                nomenclature_name:
                    type: string
                    nullable: true
                nomenclature_code:
                    type: string
                    nullable: true
                waiting_rows:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollPresencePresenceRow"
                unwind_row:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollPresencePresenceRow"
            additionalProperties: true

        OrderExecutionStageRollPresenceSnapshot:
            type: object
            description: Снимок присутствия рулонов в `result` ответа getStageRollPresence
            properties:
                work_area_id:
                    type: string
                    nullable: true
                as_of:
                    type: string
                    nullable: true
                    description: Время актуальности данных
                slot_groups:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollPresenceSlotGroup"
            additionalProperties: true

        OrderExecutionStageRollPresenceResultRow:
            type: object
            description: Обёртка ответа RPC getStageRollPresence
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionStageRollPresenceSnapshot"
            additionalProperties: true

        OrderExecutionStageRollPresenceResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionStageRollPresenceResultRow"

        OrderExecutionMaterialReturnLabelRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
                materialRollId:
                    type: string
                    description: Идентификатор рулона (`material_roll_id` из строки реестра этапа)
            required:
                - workAreaId
                - materialRollId
            additionalProperties: true

        OrderExecutionMaterialReturnLabelRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelRequestItem"

        OrderExecutionMaterialReturnLabelResultItem:
            type: object
            description: Элемент `result` в ответе printOrderExecutionMaterialReturnLabel
            properties:
                report_presenter_template_id:
                    type: string
                    nullable: true
                report_make_succeeded:
                    type: boolean
                    nullable: true
                nomenclature_name:
                    type: string
                    nullable: true
                label_payload_json:
                    type: string
                    nullable: true
                physical_print_enabled:
                    type: boolean
                    nullable: true
                current_length_m:
                    type: string
                    nullable: true
                report_parameters_json:
                    type: string
                    nullable: true
                report_make_message:
                    type: string
                    nullable: true
                template_code:
                    type: string
                    nullable: true
                print_preview_text:
                    type: string
                    nullable: true
                job_bag_document_id:
                    type: string
                    nullable: true
                report_preview_file_path:
                    type: string
                    nullable: true
                    description: Путь к PDF для открытия в отдельном окне
                report_path:
                    type: string
                    nullable: true
                barcode:
                    type: string
                    nullable: true
            additionalProperties: true

        OrderExecutionMaterialReturnLabelResultRow:
            type: object
            description: Обёртка ответа RPC printOrderExecutionMaterialReturnLabel
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultItem"
            additionalProperties: true

        OrderExecutionMaterialReturnLabelResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        JbGetListCylindersRequestItem:
            type: object
            description: Запрос jbGetListCylinders — печать «Список цилиндров» (JB)
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        JbGetListCylindersRequest:
            type: array
            minItems: 1
            description: Тело `[{ workAreaId }]` для jbGetListCylinders
            items:
                $ref: "#/components/schemas/JbGetListCylindersRequestItem"

        JbGetListCylindersResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        JbGetStageInfoRequestItem:
            type: object
            description: Запрос jbGetStageInfo — печать «Информация по этапу» (JB)
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        JbGetStageInfoRequest:
            type: array
            minItems: 1
            description: Тело `[{ workAreaId }]` для jbGetStageInfo
            items:
                $ref: "#/components/schemas/JbGetStageInfoRequestItem"

        JbGetStageInfoResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        JbMapParametersRequestItem:
            type: object
            description: Запрос jbMapParameters — печать «Карта технологических параметров печати» (JB)
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        JbMapParametersRequest:
            type: array
            minItems: 1
            description: Тело `[{ workAreaId }]` для jbMapParameters
            items:
                $ref: "#/components/schemas/JbMapParametersRequestItem"

        JbMapParametersResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        JbPaintsRecipeRequestItem:
            type: object
            description: Запрос jbPaintsRecipe — печать «Рецептура красок» (JB)
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        JbPaintsRecipeRequest:
            type: array
            minItems: 1
            description: Тело `[{ workAreaId }]` для jbPaintsRecipe
            items:
                $ref: "#/components/schemas/JbPaintsRecipeRequestItem"

        JbPaintsRecipeResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        JbLabelSectionRequestItem:
            type: object
            description: Запрос jbLabelSection — печать «Этикетка на секцию» (JB)
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        JbLabelSectionRequest:
            type: array
            minItems: 1
            description: Тело `[{ workAreaId }]` для jbLabelSection
            items:
                $ref: "#/components/schemas/JbLabelSectionRequestItem"

        JbLabelSectionResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        ConvertConsumedLengthToWeightRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
                barcode:
                    type: string
                    description: Штрихкод серии материала
                length:
                    type: number
                    description: Метраж, м (ввод оператора)
            required:
                - workAreaId
                - barcode
                - length
            additionalProperties: true

        ConvertConsumedLengthToWeightRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ConvertConsumedLengthToWeightRequestItem"

        ConvertConsumedLengthToWeightResultItem:
            type: object
            description: Элемент `result` в ответе convertConsumedLengthToWeight
            properties:
                weight_kg:
                    type: number
                    nullable: true
                    description: Рассчитанный вес, кг
            additionalProperties: true

        ConvertConsumedLengthToWeightResultRow:
            type: object
            description: Обёртка ответа RPC convertConsumedLengthToWeight
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/ConvertConsumedLengthToWeightResultItem"
            additionalProperties: true

        ConvertConsumedLengthToWeightResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ConvertConsumedLengthToWeightResultRow"

        ListReturnWarehousesRequestItem:
            type: object
            description: Запрос listReturnWarehouses (SCR-04) — комбобокс «Отправить на склад»
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
                operatorRef:
                    type: string
                    description: Ссылка на оператора в MES (`operator_ref`)
            required:
                - workAreaId
                - operatorRef
            additionalProperties: true

        ListReturnWarehousesRequest:
            type: array
