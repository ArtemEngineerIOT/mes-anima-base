        # Универсальный ответ бэка: массив узлов с примитивами и вложенным `table` (рекурсия без ограничения глубины).
        ServerDataRow:
            type: object
            description: >
                Узел дерева: произвольные поля + опционально `table` — вложенные строки того же формата.
                Примеры полей: str, int, float (nullable по договорённости бэка).
            properties:
                str:
                    type: string
                    nullable: true
                int:
                    type: integer
                    nullable: true
                float:
                    type: number
                    format: float
                    nullable: true
                table:
                    type: array
                    items:
                        $ref: "#/components/schemas/ServerDataRow"
                    nullable: true
            additionalProperties: true

        ServerDataPayload:
            type: array
            description: Корневой массив ответа RPC (повсеместный формат данных с бэка).
            items:
                $ref: "#/components/schemas/ServerDataRow"
