                    nullable: true
                label_payload_json:
                    type: string
                    nullable: true
                physical_print_enabled:
                    type: boolean
                    nullable: true
                current_length_m:
                    type: string
                    nullable: true
                report_parameters_json:
                    type: string
                    nullable: true
                report_make_message:
                    type: string
                    nullable: true
                template_code:
                    type: string
                    nullable: true
                print_preview_text:
                    type: string
                    nullable: true
                job_bag_document_id:
                    type: string
                    nullable: true
                report_preview_file_path:
                    type: string
                    nullable: true
                    description: Путь к PDF для открытия в отдельном окне
                report_path:
                    type: string
                    nullable: true
                barcode:
                    type: string
                    nullable: true
            additionalProperties: true

        OrderExecutionMaterialReturnLabelResultRow:
            type: object
            description: Обёртка ответа RPC printOrderExecutionMaterialReturnLabel
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultItem"
            additionalProperties: true

        OrderExecutionMaterialReturnLabelResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        TestGetListCylindersRequest:
            type: array
            description: Пустой массив `[]` — отчёт «Список цилиндров» без параметров
            items:
                type: object
                additionalProperties: true

        TestGetListCylindersResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        TestGetStageInfoRequest:
            type: array
