                    nullable: true
                operation_kind_label:
                    type: string
                    nullable: true
                quantity_primary:
                    type: number
                    nullable: true
                uom_primary:
                    type: string
                    nullable: true
                quantity_secondary:
                    type: number
                    nullable: true
                uom_secondary:
                    type: string
                    nullable: true
            additionalProperties: true

        OrderExecutionMaterialStageRegistryRollRow:
            type: object
            description: Карточка рулона в `result` ответа getOrderExecutionMaterialStageRegistry
            properties:
                material_roll_id:
                    type: string
                    nullable: true
                barcode:
                    type: string
                    nullable: true
                nomenclature_name:
                    type: string
                    nullable: true
                quantity_primary:
                    type: number
                    nullable: true
                uom_primary:
                    type: string
                    nullable: true
                quantity_secondary:
                    type: number
                    nullable: true
                uom_secondary:
                    type: string
                    nullable: true
                roll_status:
                    type: string
                    nullable: true
                roll_status_label:
                    type: string
                    nullable: true
                stage_input_card_status:
                    type: string
                    nullable: true
                operation_lines:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialStageRegistryOperationLine"
            additionalProperties: true

        OrderExecutionMaterialStageRegistryResultRow:
            type: object
            description: Обёртка ответа RPC getOrderExecutionMaterialStageRegistry
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                work_area_id:
                    type: string
                    nullable: true
                as_of:
                    type: string
                    nullable: true
                    description: Время актуальности данных
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialStageRegistryRollRow"
            additionalProperties: true

        OrderExecutionMaterialStageRegistryResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialStageRegistryResultRow"

        OrderExecutionMaterialReturnLabelRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
                materialRollId:
                    type: string
                    description: Идентификатор рулона (`material_roll_id` из строки реестра этапа)
            required:
                - workAreaId
                - materialRollId
            additionalProperties: true

        OrderExecutionMaterialReturnLabelRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelRequestItem"

        OrderExecutionMaterialReturnLabelResultItem:
            type: object
            description: Элемент `result` в ответе printOrderExecutionMaterialReturnLabel
