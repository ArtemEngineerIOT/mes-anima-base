            description: Элемент `result` в ответе submitBlockRequest
            properties:
                request_status:
                    type: string
                external_1s_ref:
                    type: string
                display_message:
                    type: string
            additionalProperties: true

        SubmitBlockResultRow:
            type: object
            description: Обёртка ответа RPC submitBlockRequest
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/SubmitBlockResultItem"
            additionalProperties: true

        SubmitBlockResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/SubmitBlockResultRow"

        ProductionPlanRequestItem:
            type: object
            properties:
                dateFrom:
                    type: string
                    description: Начало периода (YYYY-MM-DD)
                dateTo:
                    type: string
                    description: Конец периода (YYYY-MM-DD)
                resourceCode:
                    type: string
                    nullable: true
                    description: Код ресурса (`resourceCode` из getProductionPlanMachines); null — все машины
            additionalProperties: true

        ProductionPlanRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ProductionPlanRequestItem"

        ProductionPlanMachinesRequest:
            type: array
            description: Пустой массив `[]` — список машин без параметров
            items:
                type: object
                additionalProperties: true

        ProductionPlanMachineRow:
            type: object
            properties:
                machine:
                    type: string
                    description: Наименование машины для отображения; если нет — используется resourceCode
                resourceCode:
                    type: string
                    description: Код ресурса (уходит в resourceCode запроса getProductionPlan)
            additionalProperties: true

        ProductionPlanMachinesResponse:
            type: array
            items:
                $ref: "#/components/schemas/ProductionPlanMachineRow"

        ProductionPlanStartStageRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (в ответе getProductionPlan — `work_area_id`)
                startedBy:
                    type: string
                    description: ФИО оператора (`fio` из mesUserProfile)
            required:
                - workAreaId
                - startedBy
            additionalProperties: true

        ProductionPlanStartStageRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ProductionPlanStartStageRequestItem"

        ProductionPlanContinueStageRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ProductionPlanStartStageRequestItem"

        ProductionPlanPauseStageRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (в ответе getProductionPlan — `work_area_id`)
                startedBy:
                    type: string
                    description: ФИО оператора (`fio` из mesUserProfile)
                comment:
                    type: string
                    description: Комментарий к приостановке этапа
            required:
                - workAreaId
                - startedBy
                - comment
            additionalProperties: true

        ProductionPlanPauseStageRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ProductionPlanPauseStageRequestItem"

        ProductionPlanStageActionResultItem:
            type: object
            description: Элемент массива `result` в ответе start/pause/continueProductionPlanStage
            properties:
                work_area_id:
                    type: string
                    nullable: true
                status_code:
                    type: string
                    nullable: true
                warnings:
                    type: array
                    items:
                        type: string
                    nullable: true
                job_bag_id:
                    type: string
                    nullable: true
            additionalProperties: true

        ProductionPlanStageActionResultRow:
            type: object
            description: Обёртка результата RPC start/pause/continueProductionPlanStage
            properties:
                error_code:
                    type: string
                    description: Код результата; `OK` — успех, иначе ошибка
                error_message:
                    type: string
                    nullable: true
                    description: Текст ошибки для пользователя при error_code !== OK
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/ProductionPlanStageActionResultItem"
            additionalProperties: true

        ProductionPlanStageActionResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/ProductionPlanStageActionResultRow"

        # Универсальный ответ бэка: массив узлов с примитивами и вложенным `table` (рекурсия без ограничения глубины).
        ServerDataRow:
            type: object
            description: >
                Узел дерева: произвольные поля + опционально `table` — вложенные строки того же формата.
                Примеры полей: str, int, float (nullable по договорённости бэка).
            properties:
                str:
                    type: string
                    nullable: true
                int:
                    type: integer
                    nullable: true
                float:
                    type: number
                    format: float
                    nullable: true
                table:
                    type: array
                    items:
                        $ref: "#/components/schemas/ServerDataRow"
                    nullable: true
            additionalProperties: true

        ServerDataPayload:
            type: array
            description: Корневой массив ответа RPC (повсеместный формат данных с бэка).
            items:
                $ref: "#/components/schemas/ServerDataRow"
