        TestGetLabelSectionRequest:
            type: array
            description: Пустой массив `[]` — отчёт «Этикетка на секцию» без параметров
            items:
                type: object
                additionalProperties: true

        TestGetLabelSectionResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnLabelResultRow"

        OrderExecutionMaterialWriteoffWeightRequestItem:
            type: object
            properties:
                length:
                    type: number
                    description: Метраж, м (ввод оператора)
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
