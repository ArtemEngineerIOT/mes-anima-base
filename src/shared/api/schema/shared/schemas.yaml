components:
    schemas:
        # Схемы для summary
        Summary:
            type: object
            properties:
                systems:
                    type: array
                    items:
                        $ref: "#/components/schemas/System"
                kpi:
                    $ref: "#/components/schemas/KPI"
                equipment:
                    type: array
                    items:
                        $ref: "#/components/schemas/Equipment"

        System:
            type: object
            properties:
                id:
                    type: string
                systemName:
                    type: string
                availability:
                    type: string
                activeRequests:
                    type: integer
                averageResponseTime:
                    type: string
                onTimeCompletion:
                    type: string
                icon:
                    type: string
                status:
                    type: string
                activeAlerts:
                    type: integer
                equipmentCount:
                    type: integer
                onlineEquipment:
                    type: integer
                lastUpdate:
                    type: string
                    format: date-time

        KPI:
            type: object
            properties:
                totalActive:
                    type: integer
                averageResponseTime:
                    type: string
                onTimeCompletion:
                    type: string
                criticalIncidents:
                    type: integer

        Equipment:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                systemId:
                    type: string
                systemLabel:
                    type: string
                status:
                    type: string
                statusLabel:
                    type: string
                location:
                    type: string
                lastMaintenanceDate:
                    type: string
                    format: date-time

        # Схемы для аутентификации
        User:
            type: object
            required:
                - username
                - password
            properties:
                username:
                    type: string
                password:
                    type: string

        LoginResponse:
            type: object
            properties:
                code:
                    type: string
                message:
                    type: string
                token:
                    type: string

        MesUserProfileRequestItem:
            type: object
            required:
                - login
            properties:
                login:
                    type: string
                    description: Логин пользователя из JWT (`sub`)
            additionalProperties: true

        MesUserProfileRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/MesUserProfileRequestItem"

        MesUserProfileRow:
            type: object
            required:
                - outcome
            properties:
                outcome:
                    type: string
                    description: "SUCCESS или FAILED"
                code:
                    type: string
                    nullable: true
                    description: "MES_ACCOUNT_NOT_FOUND, MES_ACCOUNT_INACTIVE, MES_EMPLOYEE_INACTIVE"
                message:
                    type: string
                    nullable: true
                user_account_id:
                    type: string
                    nullable: true
                employee_id:
                    type: string
                    nullable: true
                fio:
                    type: string
                    nullable: true
                position:
                    type: string
                    nullable: true
                    description: Должность для UI — roles.name (человекочитаемо)
                position_code:
                    type: string
                    nullable: true
                    description: Код должности — roles.code (например OPERATOR)
                app_role_codes:
                    type: string
                    nullable: true
                    description: Коды app_roles.code через запятую (SYSTEM, OPERATOR, …) — меню и права UI
                allowed_resource_codes:
                    type: string
                    nullable: true
                    description: Коды resources.resource_code через запятую (допуски оператора)
                rights_load_outcome:
                    type: string
                    nullable: true
                    description: SUCCESS / FAILED — итог загрузки прав (при успешном профиле)
                rights_load_code:
                    type: string
                    nullable: true
                    description: MES_RIGHTS_LOAD_ERROR при сбое прав
                rights_load_message:
                    type: string
                    nullable: true
                    description: Сообщение при сбое загрузки прав
            additionalProperties: true

        MesUserProfileResponse:
            type: array
            items:
                $ref: "#/components/schemas/MesUserProfileRow"

        OrderExecutionRequestItem:
            type: object
            properties:
                resourceCode:
                    type: string
                    description: Код ресурса (машины) из getProductionPlanMachines
            required:
                - resourceCode
            additionalProperties: true

        OrderExecutionRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionRequestItem"

        OrderExecutionSidebarBadge:
            type: object
            properties:
                unprocessed_events_count:
                    type: number
                    nullable: true
            additionalProperties: true

        OrderExecutionHeaderRow:
            type: object
            properties:
                product:
                    type: string
                    nullable: true
                project:
                    type: string
                    nullable: true
                client:
                    type: string
                    nullable: true
                order:
                    type: string
                    nullable: true
            additionalProperties: true

        OrderExecutionResultItem:
            type: object
            description: Элемент `result` в ответе getOrderExecution
            properties:
                work_area_id:
                    type: string
                    nullable: true
                    description: Пусто/null — на машине нет назначенного этапа
                resource_id:
                    type: string
                    nullable: true
                sidebar_badges:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionSidebarBadge"
                header:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionHeaderRow"
            additionalProperties: true

        OrderExecutionResultRow:
            type: object
            description: Обёртка ответа RPC getOrderExecution
            properties:
                error_code:
                    type: string
                    description: Код результата; `OK` — успех, иначе ошибка
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionResultItem"
            additionalProperties: true

        OrderExecutionResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionResultRow"

        OrderExecutionMaterialSeriesRequestItem:
            type: object
            properties:
                barcode:
                    type: string
                    description: Штрихкод серии материала
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - barcode
                - workAreaId
            additionalProperties: true

        OrderExecutionMaterialSeriesRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialSeriesRequestItem"

        OrderExecutionMaterialSeriesResultItem:
            type: object
            description: Элемент `result` в ответе getOrderExecutionMaterialSeries
            properties:
                stage_spec_status:
                    type: string
                    nullable: true
                stage_spec_banner_visible:
                    type: boolean
                    nullable: true
                stage_spec_banner_title:
                    type: string
                    nullable: true
                stage_spec_banner_detail:
                    type: string
                    nullable: true
                already_registered_on_stage:
                    type: boolean
                    nullable: true
                material_roll_id:
                    type: string
                    nullable: true
                roll_trace_context_id:
                    type: string
                    nullable: true
                stage_registry_refresh_hint:
                    type: boolean
                    nullable: true
                series_card:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialSeriesCard"
            additionalProperties: true

        OrderExecutionMaterialSeriesCard:
            type: object
            properties:
                nomenclature_name:
                    type: string
                    nullable: true
                nomenclature_code:
                    type: string
                    nullable: true
                series_ref:
                    type: string
                    nullable: true
                external_series_key:
                    type: string
                    nullable: true
                quantity_uom:
                    type: string
                    nullable: true
                current_length_m:
                    type: number
                    nullable: true
                current_weight_kg:
                    type: number
                    nullable: true
                is_semi_finished:
                    type: boolean
                    nullable: true
            additionalProperties: true

        OrderExecutionMaterialSeriesResultRow:
            type: object
            description: Обёртка ответа RPC getOrderExecutionMaterialSeries
            properties:
                error_code:
                    type: string
                error_message:
                    type: string
                    nullable: true
                result:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionMaterialSeriesResultItem"
            additionalProperties: true

        OrderExecutionMaterialSeriesResponse:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialSeriesResultRow"

        OrderExecutionActiveInputPrefillRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id`)
            required:
                - workAreaId
            additionalProperties: true

        OrderExecutionActiveInputPrefillRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionActiveInputPrefillRequestItem"

        OrderExecutionActiveInputRollItem:
            type: object
            description: Строка `active_input_rolls[]` в ответе getActiveInputPrefill (SCR-04)
            properties:
                material_roll_id:
                    type: string
                    nullable: true
                roll_trace_context_id:
                    type: string
                    nullable: true
                series_key:
                    type: string
                    nullable: true
                    description: Штрихкод серии — пробелы значимы
                nomenclature_code:
                    type: string
                    nullable: true
                nomenclature_name:
                    type: string
                    nullable: true
                current_length_m:
                    type: number
                    nullable: true
            additionalProperties: true

        OrderExecutionActiveInputPrefillResultItem:
            type: object
            description: Элемент `result` в ответе getActiveInputPrefill
            properties:
                work_area_id:
                    type: string
                    nullable: true
                has_active_input_roll:
                    type: boolean
                    nullable: true
                should_prefill_scan:
                    type: boolean
                    nullable: true
                active_input_rolls:
                    type: array
                    items:
                        $ref: "#/components/schemas/OrderExecutionActiveInputRollItem"
            additionalProperties: true

        OrderExecutionActiveInputPrefillResponse:
            type: array
            minItems: 1
            items:
                allOf:
                    - $ref: "#/components/schemas/OrderExecutionReleaseRpcResultRow"
                    - type: object
                      properties:
                          result:
                              type: array
                              items:
                                  $ref: "#/components/schemas/OrderExecutionActiveInputPrefillResultItem"

        OrderExecutionMaterialStageRegistryRequestItem:
            type: object
            properties:
                workAreaId:
                    type: string
                    description: Идентификатор рабочей области этапа (`work_area_id` из getOrderExecution)
            required:
                - workAreaId
            additionalProperties: true

        OrderExecutionMaterialStageRegistryRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialStageRegistryRequestItem"

        OrderExecutionMaterialStageRegistryOperationLine:
            type: object
            properties:
                operation_kind:
