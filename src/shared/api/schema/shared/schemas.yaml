                barcode:
                    type: string
                    description: Штрихкод серии материала
                length:
                    type: number
                    description: Метраж, м
                weight:
                    type: number
                    description: Вес, кг
                warehouse:
                    type: string
                    description: Склад возврата
            required:
                - workAreaId
                - barcode
                - length
                - weight
                - warehouse
            additionalProperties: true

        OrderExecutionMaterialReturnRequest:
            type: array
            minItems: 1
            items:
                $ref: "#/components/schemas/OrderExecutionMaterialReturnRequestItem"

        OrderExecutionMaterialReturnResultItem:
            type: object
            description: Элемент `result` в ответе registerOrderExecutionMaterialReturn
            properties:
                stage_registry_refresh_hint:
                    type: boolean
                    nullable: true
            additionalProperties: true

        OrderExecutionMaterialReturnResultRow:
