getSummary:
    summary: Получение данных сводного экрана оператора
    security:
        - bearerAuth: []
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    type: object
                    properties: {}
    responses:
        "200":
            description: Успешное получение данных сводного экрана
            content:
                application/json:
                    schema:
                        $ref: "../../shared/schemas.yaml#/components/schemas/Summary"
        "400":
            $ref: "../../shared/responses.yaml#/components/responses/Error"
        "401":
            $ref: "../../shared/responses.yaml#/components/responses/UnauthorizedError"
