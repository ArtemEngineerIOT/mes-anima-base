    description: Блоки «Входные рулоны» и «Выходные рулоны» в левой колонке «Мониторинг»
    security:
        - bearerAuth: []
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    $ref: "../../shared/schemas.yaml#/components/schemas/OrderExecutionMonitoringRollTablesRequest"
    responses:
        "200":
            description: Таблицы рулонов (error_code OK — успех)
            content:
                application/json:
                    schema:
                        $ref: "../../shared/schemas.yaml#/components/schemas/OrderExecutionMonitoringRollTablesResponse"
        "400":
            $ref: "../../shared/responses.yaml#/components/responses/Error"
        "401":
            $ref: "../../shared/responses.yaml#/components/responses/UnauthorizedError"

